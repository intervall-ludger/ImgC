name: CI

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build wasm target
        run: cargo build -p imgc-wasm --target wasm32-unknown-unknown --release

  heic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libheif
        run: |
          sudo apt-get update
          sudo apt-get install -y libheif-dev
      - name: Clippy (heic)
        run: cargo clippy --all-targets --features imgc-cli/heic -- -D warnings
      - name: Test (heic)
        run: cargo test -p imgc-cli --features heic
